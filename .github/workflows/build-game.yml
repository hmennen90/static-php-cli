name: "Build Game micro.sfx"

on:
  workflow_dispatch:
    inputs:
      php-version:
        required: true
        description: PHP version
        default: '8.5'
        type: choice
        options:
          - '8.5'
          - '8.4'
      os:
        required: true
        description: Target platform
        default: 'macos-aarch64'
        type: choice
        options:
          - 'macos-aarch64'
          - 'macos-x86_64'
          - 'linux-x86_64'
          - 'linux-aarch64'
          - 'windows-x86_64'

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: "base"
            extensions: "glfw,mbstring,zip"
            steam: false
          - name: "steam"
            extensions: "glfw,mbstring,zip,steamworks"
            steam: true
    name: "${{ matrix.variant.name }} / ${{ inputs.os }}"
    runs-on: >-
      ${{
        inputs.os == 'macos-aarch64' && 'macos-15' ||
        inputs.os == 'macos-x86_64' && 'macos-15-intel' ||
        inputs.os == 'linux-aarch64' && 'ubuntu-24.04-arm' ||
        inputs.os == 'windows-x86_64' && 'windows-latest' ||
        'ubuntu-latest'
      }}
    timeout-minutes: 120
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer
          extensions: curl, openssl, mbstring
          ini-values: memory_limit=-1

      # For Steam variant: clone php-steamworks which bundles the SDK redistributable libs
      - name: "Prepare Steamworks SDK"
        if: matrix.variant.steam
        shell: bash
        run: |
          git clone --depth 1 https://${{ github.token }}@github.com/hmennen90/php-steamworks.git /tmp/php-steamworks
          mkdir -p source/steamworks-sdk/redistributable_bin
          cp -r /tmp/php-steamworks/sdk/redistributable_bin/* source/steamworks-sdk/redistributable_bin/
          cp -r /tmp/php-steamworks/sdk/public source/steamworks-sdk/public || true
          rm -rf /tmp/php-steamworks

      # ── Unix builds (macOS / Linux) ──
      - name: "Download sources (macOS)"
        if: startsWith(inputs.os, 'macos-')
        run: |
          composer update --no-dev --classmap-authoritative
          ./bin/spc doctor --auto-fix || true
          ./bin/spc download \
            --with-php=${{ inputs.php-version }} \
            --for-extensions=${{ matrix.variant.extensions }} \
            --ignore-cache-sources=php-src \
            --prefer-pre-built

      - name: "Build micro.sfx (macOS)"
        if: startsWith(inputs.os, 'macos-')
        run: ./bin/spc build ${{ matrix.variant.extensions }} --build-micro

      - name: "Download sources (Linux)"
        if: startsWith(inputs.os, 'linux-')
        run: |
          ./bin/spc-alpine-docker download \
            --with-php=${{ inputs.php-version }} \
            --for-extensions=${{ matrix.variant.extensions }} \
            --ignore-cache-sources=php-src \
            --prefer-pre-built

      - name: "Build micro.sfx (Linux)"
        if: startsWith(inputs.os, 'linux-')
        run: ./bin/spc-alpine-docker build ${{ matrix.variant.extensions }} --build-micro

      # ── Windows build ──
      - name: "Cache Composer (Windows)"
        if: inputs.os == 'windows-x86_64'
        id: cache-composer-deps
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-dependencies

      - name: "Install Composer deps (Windows)"
        if: inputs.os == 'windows-x86_64' && steps.cache-composer-deps.outputs.cache-hit != 'true'
        run: composer update --no-dev --classmap-authoritative

      - name: "Doctor (Windows)"
        if: inputs.os == 'windows-x86_64'
        run: ./bin/spc doctor

      - name: "Download sources (Windows)"
        if: inputs.os == 'windows-x86_64'
        run: |
          ./bin/spc download --with-php="${{ inputs.php-version }}" --for-extensions="${{ matrix.variant.extensions }}" --prefer-pre-built

      - name: "Build micro.sfx (Windows)"
        if: inputs.os == 'windows-x86_64'
        run: ./bin/spc build "${{ matrix.variant.extensions }}" --build-micro

      # ── Upload artifacts ──
      - name: "Upload micro.sfx"
        uses: actions/upload-artifact@v4
        with:
          name: micro-sfx-${{ matrix.variant.name }}-${{ inputs.php-version }}-${{ inputs.os }}
          path: |
            buildroot/bin/micro.sfx
            buildroot/bin/micro.sfx.exe

      # For Steam variant: also upload the dynamic lib that must be bundled
      - name: "Upload libsteam_api"
        if: matrix.variant.steam
        uses: actions/upload-artifact@v4
        with:
          name: libsteam-api-${{ inputs.os }}
          path: |
            buildroot/lib/libsteam_api.dylib
            buildroot/lib/libsteam_api.so
            buildroot/lib/steam_api64.dll

      - name: "Upload licenses"
        uses: actions/upload-artifact@v4
        with:
          name: licenses-${{ matrix.variant.name }}-${{ inputs.php-version }}-${{ inputs.os }}
          path: buildroot/license/
