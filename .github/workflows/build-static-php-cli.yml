name: "Build Game micro.sfx"

on:
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-php84:
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: macos-aarch64
            runner: macos-15
            platform: macos
            gpu_extensions: ",vio,vulkan,metal"
          - name: macos-x86_64
            runner: macos-15-intel
            platform: macos
            gpu_extensions: ",vio,vulkan,metal"
          - name: linux-x86_64
            runner: ubuntu-latest
            platform: linux
            gpu_extensions: ",vio,vulkan"
          - name: linux-aarch64
            runner: ubuntu-24.04-arm
            platform: linux
            gpu_extensions: ",vio,vulkan"
          - name: windows-x86_64
            runner: windows-latest
            platform: windows
            gpu_extensions: ",vio,vulkan"
        variant:
          - name: base
            extensions: "glfw,mbstring,zip,phar"
            steam: false
          - name: steam
            extensions: "glfw,mbstring,zip,phar,steamworks"
            steam: true
        exclude:
          - os: { name: linux-aarch64 }
            variant: { name: steam }
    name: "${{ matrix.variant.name }} / ${{ matrix.os.name }} / php8.4"
    runs-on: ${{ matrix.os.runner }}
    timeout-minutes: 120
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer
          extensions: curl, openssl, mbstring
          ini-values: memory_limit=-1

      - name: "Prepare Steamworks SDK"
        if: matrix.variant.steam
        shell: bash
        run: |
          git clone --depth 1 https://${{ github.token }}@github.com/hmennen90/php-steamworks.git /tmp/php-steamworks
          mkdir -p source/steamworks-sdk/redistributable_bin
          cp -r /tmp/php-steamworks/sdk/redistributable_bin/* source/steamworks-sdk/redistributable_bin/
          cp -r /tmp/php-steamworks/sdk/public source/steamworks-sdk/public || true
          rm -rf /tmp/php-steamworks

      - name: "Download & Build (macOS)"
        if: matrix.os.platform == 'macos'
        run: |
          composer install --no-dev --classmap-authoritative
          ./bin/spc doctor --auto-fix || true
          ./bin/spc download \
            --with-php=8.4 \
            --for-extensions=${{ matrix.variant.extensions }}${{ matrix.os.gpu_extensions }} \
            --ignore-cache-sources=php-src \
            --prefer-pre-built
          ./bin/spc build ${{ matrix.variant.extensions }}${{ matrix.os.gpu_extensions }} --build-micro -I "memory_limit=-1" --without-micro-ext-test

      - name: "Download & Build (Linux)"
        if: matrix.os.platform == 'linux'
        run: |
          if [ "${{ matrix.variant.steam }}" = "true" ]; then
            SPC_CMD="./bin/spc-gnu-docker"
          else
            SPC_CMD="./bin/spc-alpine-docker"
          fi
          $SPC_CMD download \
            --with-php=8.4 \
            --for-extensions=${{ matrix.variant.extensions }}${{ matrix.os.gpu_extensions }} \
            --ignore-cache-sources=php-src \
            --prefer-pre-built
          $SPC_CMD build ${{ matrix.variant.extensions }}${{ matrix.os.gpu_extensions }} --build-micro -I "memory_limit=-1" --without-micro-ext-test

      - name: "Install Composer deps (Windows)"
        if: matrix.os.platform == 'windows'
        run: composer install --no-dev --classmap-authoritative

      - name: "Download & Build (Windows)"
        if: matrix.os.platform == 'windows'
        run: |
          ./bin/spc doctor
          ./bin/spc download --with-php="8.4" --for-extensions="${{ matrix.variant.extensions }}${{ matrix.os.gpu_extensions }}" --prefer-pre-built
          ./bin/spc build "${{ matrix.variant.extensions }}${{ matrix.os.gpu_extensions }}" --build-micro -I "memory_limit=-1" --without-micro-ext-test

      - name: "Debug: dump configure.js context (Windows failure)"
        if: failure() && matrix.os.platform == 'windows'
        shell: pwsh
        run: |
          $configPath = "source/php-src/configure.js"
          if (Test-Path $configPath) {
            Write-Host "=== configure.js lines 4270-4310 ==="
            Get-Content $configPath | Select-Object -Skip 4269 -First 41 | ForEach-Object -Begin {$i=4270} -Process { "{0,5}: {1}" -f $i, $_; $i++ }
            Write-Host "=== end ==="
          } else {
            Write-Host "configure.js not found at $configPath"
            Get-ChildItem -Recurse -Filter configure.js source/ -ErrorAction SilentlyContinue | Select-Object -First 5 | ForEach-Object { Write-Host $_.FullName }
          }

      - name: "Upload configure.js (Windows failure)"
        if: failure() && matrix.os.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: configure-js-${{ matrix.variant.name }}-8.4-${{ matrix.os.name }}
          path: source/php-src/configure.js
          if-no-files-found: warn

      - name: "Upload ext config.w32 files (Windows failure)"
        if: failure() && matrix.os.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ext-config-w32-${{ matrix.variant.name }}-8.4-${{ matrix.os.name }}
          path: |
            source/php-src/ext/*/config.w32
            source/vio/config.w32
          if-no-files-found: warn

      - name: "Upload build logs"
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.variant.name }}-8.4-${{ matrix.os.name }}
          path: log/

      - name: "Upload micro.sfx"
        uses: actions/upload-artifact@v4
        with:
          name: micro-sfx-${{ matrix.variant.name }}-8.4-${{ matrix.os.name }}
          path: |
            buildroot/bin/micro.sfx
            buildroot/bin/micro.sfx.exe

      - name: "Upload vulkan-1.dll (Windows)"
        if: matrix.os.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: vulkan-1-dll-${{ matrix.variant.name }}-8.4-${{ matrix.os.name }}
          path: buildroot/bin/vulkan-1.dll

      - name: "Upload libsteam_api"
        if: matrix.variant.steam
        uses: actions/upload-artifact@v4
        with:
          name: libsteam-api-8.4-${{ matrix.os.name }}
          path: |
            buildroot/lib/libsteam_api.dylib
            buildroot/lib/libsteam_api.so
            buildroot/lib/steam_api64.dll

      - name: "Upload licenses"
        uses: actions/upload-artifact@v4
        with:
          name: licenses-${{ matrix.variant.name }}-8.4-${{ matrix.os.name }}
          path: buildroot/license/

  build-php85:
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: macos-aarch64
            runner: macos-15
            platform: macos
            gpu_extensions: ",vio,vulkan,metal"
          - name: macos-x86_64
            runner: macos-15-intel
            platform: macos
            gpu_extensions: ",vio,vulkan,metal"
          - name: linux-x86_64
            runner: ubuntu-latest
            platform: linux
            gpu_extensions: ",vio,vulkan"
          - name: linux-aarch64
            runner: ubuntu-24.04-arm
            platform: linux
            gpu_extensions: ",vio,vulkan"
          - name: windows-x86_64
            runner: windows-latest
            platform: windows
            gpu_extensions: ",vio,vulkan"
        variant:
          - name: base
            extensions: "glfw,mbstring,zip,phar"
            steam: false
          - name: steam
            extensions: "glfw,mbstring,zip,phar,steamworks"
            steam: true
        exclude:
          - os: { name: linux-aarch64 }
            variant: { name: steam }
    name: "${{ matrix.variant.name }} / ${{ matrix.os.name }} / php8.5"
    runs-on: ${{ matrix.os.runner }}
    timeout-minutes: 120
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer
          extensions: curl, openssl, mbstring
          ini-values: memory_limit=-1

      - name: "Prepare Steamworks SDK"
        if: matrix.variant.steam
        shell: bash
        run: |
          git clone --depth 1 https://${{ github.token }}@github.com/hmennen90/php-steamworks.git /tmp/php-steamworks
          mkdir -p source/steamworks-sdk/redistributable_bin
          cp -r /tmp/php-steamworks/sdk/redistributable_bin/* source/steamworks-sdk/redistributable_bin/
          cp -r /tmp/php-steamworks/sdk/public source/steamworks-sdk/public || true
          rm -rf /tmp/php-steamworks

      - name: "Download & Build (macOS)"
        if: matrix.os.platform == 'macos'
        run: |
          composer install --no-dev --classmap-authoritative
          ./bin/spc doctor --auto-fix || true
          ./bin/spc download \
            --with-php=8.5 \
            --for-extensions=${{ matrix.variant.extensions }}${{ matrix.os.gpu_extensions }} \
            --ignore-cache-sources=php-src \
            --prefer-pre-built
          ./bin/spc build ${{ matrix.variant.extensions }}${{ matrix.os.gpu_extensions }} --build-micro -I "memory_limit=-1" --without-micro-ext-test

      - name: "Download & Build (Linux)"
        if: matrix.os.platform == 'linux'
        run: |
          if [ "${{ matrix.variant.steam }}" = "true" ]; then
            SPC_CMD="./bin/spc-gnu-docker"
          else
            SPC_CMD="./bin/spc-alpine-docker"
          fi
          $SPC_CMD download \
            --with-php=8.5 \
            --for-extensions=${{ matrix.variant.extensions }}${{ matrix.os.gpu_extensions }} \
            --ignore-cache-sources=php-src \
            --prefer-pre-built
          $SPC_CMD build ${{ matrix.variant.extensions }}${{ matrix.os.gpu_extensions }} --build-micro -I "memory_limit=-1" --without-micro-ext-test

      - name: "Install Composer deps (Windows)"
        if: matrix.os.platform == 'windows'
        run: composer install --no-dev --classmap-authoritative

      - name: "Download & Build (Windows)"
        if: matrix.os.platform == 'windows'
        run: |
          ./bin/spc doctor
          ./bin/spc download --with-php="8.5" --for-extensions="${{ matrix.variant.extensions }}${{ matrix.os.gpu_extensions }}" --prefer-pre-built
          ./bin/spc build "${{ matrix.variant.extensions }}${{ matrix.os.gpu_extensions }}" --build-micro -I "memory_limit=-1" --without-micro-ext-test

      - name: "Upload build logs"
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.variant.name }}-8.5-${{ matrix.os.name }}
          path: log/

      - name: "Upload micro.sfx"
        uses: actions/upload-artifact@v4
        with:
          name: micro-sfx-${{ matrix.variant.name }}-8.5-${{ matrix.os.name }}
          path: |
            buildroot/bin/micro.sfx
            buildroot/bin/micro.sfx.exe

      - name: "Upload vulkan-1.dll (Windows)"
        if: matrix.os.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: vulkan-1-dll-${{ matrix.variant.name }}-8.5-${{ matrix.os.name }}
          path: buildroot/bin/vulkan-1.dll

      - name: "Upload libsteam_api"
        if: matrix.variant.steam
        uses: actions/upload-artifact@v4
        with:
          name: libsteam-api-8.5-${{ matrix.os.name }}
          path: |
            buildroot/lib/libsteam_api.dylib
            buildroot/lib/libsteam_api.so
            buildroot/lib/steam_api64.dll

      - name: "Upload licenses"
        uses: actions/upload-artifact@v4
        with:
          name: licenses-${{ matrix.variant.name }}-8.5-${{ matrix.os.name }}
          path: buildroot/license/

  release-php84:
    name: "Release / php8.4"
    needs: build-php84
    if: always() && needs.build-php84.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: "Download micro.sfx artifacts"
        uses: actions/download-artifact@v4
        with:
          pattern: micro-sfx-*-8.4-*
          path: release-assets/

      - name: "Download vulkan-1.dll artifacts"
        uses: actions/download-artifact@v4
        with:
          pattern: vulkan-1-dll-*-8.4-*
          path: release-assets/

      - name: "Download libsteam artifacts"
        uses: actions/download-artifact@v4
        with:
          pattern: libsteam-api-8.4-*
          path: release-assets/

      - name: "Prepare release files"
        run: |
          mkdir -p release-files
          cd release-assets
          for dir in */; do
            name="${dir%/}"
            cd "$name"
            zip -r "../../release-files/${name}.zip" .
            cd ..
          done

      - name: "Create or update release"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="runtime-php8.4"
          TITLE="Game Runtime PHP 8.4"

          # Delete existing release if it exists
          gh release delete "$TAG" -R ${{ github.repository }} --yes 2>/dev/null || true

          # Create new release
          gh release create "$TAG" \
            -R ${{ github.repository }} \
            --title "$TITLE" \
            --notes "Pre-built micro.sfx binaries for game distribution.

          **PHP Version:** 8.4
          **Extensions (base):** glfw, vio, vulkan, metal (macOS), mbstring, zip, phar
          **Extensions (steam):** glfw, vio, vulkan, metal (macOS), mbstring, zip, phar, steamworks

          Built by workflow run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            release-files/*.zip

  release-php85:
    name: "Release / php8.5"
    needs: build-php85
    if: always() && needs.build-php85.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: "Download micro.sfx artifacts"
        uses: actions/download-artifact@v4
        with:
          pattern: micro-sfx-*-8.5-*
          path: release-assets/

      - name: "Download vulkan-1.dll artifacts"
        uses: actions/download-artifact@v4
        with:
          pattern: vulkan-1-dll-*-8.5-*
          path: release-assets/

      - name: "Download libsteam artifacts"
        uses: actions/download-artifact@v4
        with:
          pattern: libsteam-api-8.5-*
          path: release-assets/

      - name: "Prepare release files"
        run: |
          mkdir -p release-files
          cd release-assets
          for dir in */; do
            name="${dir%/}"
            cd "$name"
            zip -r "../../release-files/${name}.zip" .
            cd ..
          done

      - name: "Create or update release"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="runtime-php8.5"
          TITLE="Game Runtime PHP 8.5"

          # Delete existing release if it exists
          gh release delete "$TAG" -R ${{ github.repository }} --yes 2>/dev/null || true

          # Create new release
          gh release create "$TAG" \
            -R ${{ github.repository }} \
            --title "$TITLE" \
            --notes "Pre-built micro.sfx binaries for game distribution.

          **PHP Version:** 8.5
          **Extensions (base):** glfw, vio, vulkan, metal (macOS), mbstring, zip, phar
          **Extensions (steam):** glfw, vio, vulkan, metal (macOS), mbstring, zip, phar, steamworks

          Built by workflow run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            release-files/*.zip
